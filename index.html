<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MADEL SCORE by JPS</title>
    <style>
        :root { --p1-color: #00e676; --p2-color: #ff5252; --bg: #000; }
        body { background: var(--bg); color: #fff; text-align: center; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; margin: 0; overflow: hidden; }
        
        header { background: #111; padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        #brand { font-weight: bold; font-size: 18px; color: #fff; letter-spacing: 1px; }
        
        .toggle-btn { background: #333; color: #fff; border: 1px solid #555; padding: 6px 12px; border-radius: 15px; font-size: 11px; cursor: pointer; }
        .active { background: #fff; color: #000; font-weight: bold; }

        .court { flex: 1; display: flex; flex-direction: row; }
        .pane { flex: 1; display: flex; flex-direction: column; justify-content: center; position: relative; transition: background 0.1s; cursor: pointer; }
        .score { font-size: 22vw; font-weight: 900; line-height: 1; margin: 0; }
        .label { font-size: 3vw; color: #444; text-transform: uppercase; letter-spacing: 2px; }
        .divider { width: 2px; background: #222; }

        .p1-active { color: var(--p1-color) !important; }
        .p2-active { color: var(--p2-color) !important; }
        .win-text { font-size: 18vw !important; color: #fff !important; }
        .flash { background: #1a1a1a !important; }

        #footer { background: #111; padding: 12px; font-size: 11px; color: #666; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <header>
        <span id="brand">MADEL SCORE by JPS</span>
        <button id="modeToggle" class="toggle-btn" onclick="toggleMode()">MODE: DEUCE</button>
    </header>

    <div class="court">
        <div id="p1Area" class="pane" onclick="handleInput(1)">
            <div class="label">YOU</div>
            <div id="p1Disp" class="score p1-active">0</div>
        </div>
        <div class="divider"></div>
        <div id="p2Area" class="pane" onclick="handleInput(2)">
            <div class="label">OPPONENT</div>
            <div id="p2Disp" class="score p2-active">0</div>
        </div>
    </div>

    <div id="footer">
        <b>[ENTER] KEY:</b> 1x=You | 2x=Opp | Hold=Undo<br>
        Tap screen once to enable the Umpire.
    </div>

    <script>
        let p1 = 0, p2 = 0, history = [], isGoldenPoint = false, isGameOver = false;
        let clickCount = 0, clickTimer = null, pressTimer = null, isLongPress = false;
        const vals = ["Zero", "15", "30", "40", "AD"];
        const synth = window.speechSynthesis;

        function announce(text) {
            synth.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            
            // Voice Selection Logic
            const voices = synth.getVoices();
            // Filter for Female voices (prioritizing English)
            let femaleVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Google UK English Female') || v.name.includes('Samantha') || v.name.includes('Zira'));
            
            if (femaleVoice) {
                msg.voice = femaleVoice;
                msg.pitch = 1.0;
            } else {
                // Fallback: If no explicit female voice found, raise the pitch of default
                msg.pitch = 1.3; 
            }
            
            msg.rate = 1.1; 
            synth.speak(msg);
        }

        // Necessary because voices load asynchronously
        window.speechSynthesis.onvoiceschanged = () => { synth.getVoices(); };

        function toggleMode() {
            if (p1 === 0 && p2 === 0) {
                isGoldenPoint = !isGoldenPoint;
                document.getElementById('modeToggle').innerText = isGoldenPoint ? "MODE: GOLDEN POINT" : "MODE: DEUCE";
                document.getElementById('modeToggle').classList.toggle('active');
                announce(`Scoring mode: ${isGoldenPoint ? 'Golden Point' : 'Deuce'}`);
            }
        }

        function render() {
            const d1 = document.getElementById('p1Disp'), d2 = document.getElementById('p2Disp');
            d1.classList.remove('win-text'); d2.classList.remove('win-text');

            if (isGameOver) {
                if (p1 > p2) { d1.innerText = "WIN"; d1.classList.add('win-text'); d2.innerText = (isGoldenPoint ? vals[p2] : "40"); }
                else { d2.innerText = "WIN"; d2.classList.add('win-text'); d1.innerText = (isGoldenPoint ? vals[p1] : "40"); }
                return;
            }

            const deuce = (p1 >= 3 && p2 >= 3);
            if (!isGoldenPoint && deuce) {
                if (p1 === p2) { d1.innerText = "40"; d2.innerText = "40"; announce("Deuce"); }
                else if (p1 > p2) { d1.innerText = "AD"; d2.innerText = "40"; announce("Advantage You"); }
                else { d1.innerText = "40"; d2.innerText = "AD"; announce("Advantage Opponent"); }
            } else {
                d1.innerText = (vals[p1] === "Zero" ? "0" : vals[p1]);
                d2.innerText = (vals[p2] === "Zero" ? "0" : vals[p2]);
                if (p1 + p2 > 0) announce(`${vals[p1]}, ${vals[p2]}`);
            }
        }

        function handleScore(player) {
            history.push({p1, p2});
            if (player === 1) p1++; else p2++;

            // Win Checking
            if (isGoldenPoint) {
                if (p1 === 4 || p2 === 4) isGameOver = true;
            } else {
                if ((p1 > 3 && p1 - p2 >= 2) || (p2 > 3 && p2 - p1 >= 2)) isGameOver = true;
            }

            if (isGameOver) announce(`Game to ${player === 1 ? 'you' : 'opponent'}`);
            
            const areaId = player === 1 ? 'p1Area' : 'p2Area';
            document.getElementById(areaId).classList.add('flash');
            setTimeout(() => document.getElementById(areaId).classList.remove('flash'), 100);
            render();
        }

        function undo() {
            if (history.length > 0) {
                const last = history.pop();
                p1 = last.p1; p2 = last.p2; isGameOver = false;
                render();
                announce(`Undo. Score is ${vals[p1]}, ${vals[p2]}`);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.repeat) {
                isLongPress = false;
                pressTimer = setTimeout(() => { isLongPress = true; undo(); }, 700); 
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                clearTimeout(pressTimer);
                if (isLongPress) return;
                if (isGameOver) { p1 = 0; p2 = 0; history = []; isGameOver = false; render(); announce("New game"); return; }
                
                clickCount++;
                if (clickTimer) clearTimeout(clickTimer);
                clickTimer = setTimeout(() => {
                    if (clickCount === 1) handleScore(1);
                    else if (clickCount === 2) handleScore(2);
                    clickCount = 0;
                }, 400); 
            }
        });

        window.addEventListener('click', () => { announce("Umpire ready"); }, { once: true });
        render();
    </script>
</body>
</html>
