<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MADEL SCORE by JPS</title>
    <style>
        :root { --p1-color: #00e676; --p2-color: #ff5252; --bg: #000; }
        body { background: var(--bg); color: #fff; text-align: center; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; margin: 0; overflow: hidden; }
        header { background: #111; padding: 10px 15px; border-bottom: 1px solid #333; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        #brand { font-weight: bold; font-size: 18px; color: #fff; letter-spacing: 1px; }
        .toolbar { display: flex; gap: 5px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .btn { background: #333; color: #fff; border: 1px solid #555; padding: 6px 8px; border-radius: 12px; font-size: 10px; cursor: pointer; outline: none; flex: 1; min-width: 70px; max-width: 90px; }
        .btn:active { background: #555; }
        #modeModal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { background: #222; padding: 20px; border-radius: 20px; border: 1px solid #444; width: 85%; max-width: 320px; }
        .modal-btn { background: #444; color: white; border: none; padding: 12px; margin: 5px 0; width: 100%; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .set-score-bar { background: #1a1a1a; padding: 8px; font-size: 20px; font-weight: bold; color: #888; border-bottom: 1px solid #333; display: flex; justify-content: space-around; }
        .set-score-bar span { color: #fff; margin: 0 10px; }
        .court { flex: 1; display: flex; flex-direction: row; }
        .pane { flex: 1; display: flex; flex-direction: column; justify-content: center; position: relative; transition: background 0.1s; cursor: pointer; }
        .score { font-size: 22vw; font-weight: 900; line-height: 1; margin: 0; }
        .label { font-size: 3vw; color: #444; text-transform: uppercase; letter-spacing: 2px; }
        .divider { width: 2px; background: #222; }
        .p1-active { color: var(--p1-color) !important; }
        .p2-active { color: var(--p2-color) !important; }
        .win-text { font-size: 18vw !important; color: #fff !important; }
        .flash { background: #1a1a1a !important; }
        #footer { background: #111; padding: 10px; font-size: 10px; color: #666; border-top: 1px solid #333; }
        .locked { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div id="modeModal">
        <div class="modal-content">
            <h3 style="margin-top:0">Scoring Type</h3>
            <button class="modal-btn" onclick="selectMode('DEUCE')">DEUCE</button>
            <button class="modal-btn" onclick="selectMode('GOLDEN POINT')">GOLDEN POINT</button>
            <button class="modal-btn" onclick="selectMode('16-POINT')">16-POINT</button>
            <button class="modal-btn" onclick="selectMode('24-POINT')">24-POINT</button>
            <button class="modal-btn" onclick="selectMode('32-POINT')">32-POINT</button>
            <button class="modal-btn" style="background:transparent; font-size:12px;" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <header id="mainHeader">
        <span id="brand">MADEL SCORE by JPS</span>
        <div class="toolbar">
            <button id="modeBtn" class="btn" onclick="openModal()">DEUCE (0)</button>
            <button class="btn" onclick="uiUndo(this)">UNDO (3)</button>
            <button class="btn" onclick="uiAnnounce(this)">REPORT (4)</button>
            <button id="fsBtn" class="btn" onclick="toggleFullscreen(this)">FULL (5)</button>
        </div>
    </header>

    <div class="set-score-bar">
        <div>YOU: <span id="set1">0</span></div>
        <div>OPP: <span id="set2">0</span></div>
    </div>

    <div id="courtArea" class="court">
        <div id="p1Area" class="pane" onclick="handleInput(1)">
            <div class="label">YOU (1)</div>
            <div id="p1Disp" class="score p1-active">0</div>
        </div>
        <div class="divider"></div>
        <div id="p2Area" class="pane" onclick="handleInput(2)">
            <div class="label">OPPONENT (2)</div>
            <div id="p2Disp" class="score p2-active">0</div>
        </div>
    </div>

    <div id="footer">
        [1,2,3,4,5,0] Active | [9] Reload | [ENTER]: Multi-Click
    </div>

    <script>
        let p1 = 0, p2 = 0, s1 = 0, s2 = 0;
        let history = []; 
        let currentMode = 'DEUCE'; 
        const modes = ['DEUCE', 'GOLDEN POINT', '16-POINT', '24-POINT', '32-POINT'];
        let isGameOver = false, voiceUnlocked = false, isInputLocked = false;
        let clickCount = 0, clickTimer = null;

        const vals = ["Zero", "15", "30", "40", "AD"];
        const synth = window.speechSynthesis;

        function init() {
            const savedMode = localStorage.getItem('madel_mode');
            if (savedMode) {
                currentMode = savedMode;
                document.getElementById('modeBtn').innerText = savedMode + " (0)";
            }
            render();
        }

        function openModal() {
            if (p1 === 0 && p2 === 0) document.getElementById('modeModal').style.display = 'flex';
            else announce("Reset score to change mode.");
        }

        function closeModal() { document.getElementById('modeModal').style.display = 'none'; }

        function selectMode(choice) {
            currentMode = choice;
            localStorage.setItem('madel_mode', choice);
            document.getElementById('modeBtn').innerText = choice + " (0)";
            closeModal();
            if (!voiceUnlocked) unlockVoice();
            else announce("Mode " + choice);
        }

        function cycleMode() {
            if (p1 !== 0 || p2 !== 0) {
                announce("Reset score to change mode.");
                return;
            }
            let idx = modes.indexOf(currentMode);
            let nextIdx = (idx + 1) % modes.length;
            selectMode(modes[nextIdx]);
        }

        function toggleFullscreen(btn = document.getElementById('fsBtn')) {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => { console.log(err); });
            } else {
                document.exitFullscreen();
            }
            if (btn) btn.blur();
            if (!voiceUnlocked) unlockVoice();
        }

        document.addEventListener('fullscreenchange', () => {
            const btn = document.getElementById('fsBtn');
            btn.innerText = document.fullscreenElement ? "EXIT (5)" : "FULL (5)";
        });

        function announce(text) {
            if (!voiceUnlocked) return;
            synth.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            const voices = synth.getVoices();
            let femaleVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Google UK English Female') || v.name.includes('Samantha') || v.name.includes('Zira'));
            if (femaleVoice) { msg.voice = femaleVoice; msg.pitch = 1.0; } else { msg.pitch = 1.3; }
            msg.rate = 1.1; 
            synth.speak(msg);
        }

        function unlockVoice() {
            if (voiceUnlocked) return false;
            voiceUnlocked = true;
            announce("Umpire ready");
            lockInput();
            return true;
        }

        function lockInput() {
            isInputLocked = true;
            document.getElementById('courtArea').classList.add('locked');
            setTimeout(() => {
                isInputLocked = false;
                document.getElementById('courtArea').classList.remove('locked');
            }, 1000);
        }

        function uiUndo(btn) { if (!voiceUnlocked) unlockVoice(); undo(); if(btn) btn.blur(); }
        function uiAnnounce(btn) { if (!voiceUnlocked) unlockVoice(); else announce(getFullStatus()); if(btn) btn.blur(); }

        function getFullStatus() {
            let gameScore = "";
            if (currentMode === 'DEUCE' || currentMode === 'GOLDEN POINT') {
                gameScore = (p1 >= 3 && p2 >= 3 && currentMode === 'DEUCE') ? 
                    (p1 === p2 ? "Deuce" : (p1 > p2 ? "Advantage You" : "Advantage Opponent")) :
                    `${vals[p1]}, ${vals[p2]}`;
            } else {
                gameScore = `${p1} to ${p2}`;
            }
            let setScore = s1 === s2 ? `Set is ${s1} games all` : (s1 > s2 ? `You lead ${s1} to ${s2}` : `Opponent leads ${s2} to ${s1}`);
            return `Score is ${gameScore}. ${setScore}.`;
        }

        function render() {
            const d1 = document.getElementById('p1Disp'), d2 = document.getElementById('p2Disp');
            document.getElementById('set1').innerText = s1;
            document.getElementById('set2').innerText = s2;
            d1.classList.remove('win-text'); d2.classList.remove('win-text');

            if (isGameOver) {
                if (p1 > p2) { d1.innerText = "WIN"; d1.classList.add('win-text'); d2.innerText = p2; }
                else { d2.innerText = "WIN"; d2.classList.add('win-text'); d1.innerText = p1; }
                return;
            }

            if (currentMode === 'DEUCE' || currentMode === 'GOLDEN POINT') {
                const deuce = (p1 >= 3 && p2 >= 3);
                if (currentMode === 'DEUCE' && deuce) {
                    if (p1 === p2) { d1.innerText = "40"; d2.innerText = "40"; }
                    else if (p1 > p2) { d1.innerText = "AD"; d2.innerText = "40"; }
                    else { d1.innerText = "40"; d2.innerText = "AD"; }
                } else {
                    d1.innerText = (vals[p1] === "Zero" ? "0" : vals[p1]);
                    d2.innerText = (vals[p2] === "Zero" ? "0" : vals[p2]);
                }
            } else {
                d1.innerText = p1; d2.innerText = p2;
            }
        }

        function handleScore(player) {
            if (isInputLocked) return;
            history.push({p1, p2, s1, s2, isGameOver});
            if (player === 1) p1++; else p2++;

            if (currentMode === 'GOLDEN POINT') {
                if (p1 === 4 || p2 === 4) { isGameOver = true; if(p1 === 4) s1++; else s2++; }
            } else if (currentMode === 'DEUCE') {
                if ((p1 > 3 && p1 - p2 >= 2) || (p2 > 3 && p2 - p1 >= 2)) { isGameOver = true; if(p1 > p2) s1++; else s2++; }
            } else {
                let limit = parseInt(currentMode);
                if (p1 + p2 >= limit) { isGameOver = true; if(p1 > p2) s1++; else s2++; }
            }

            if (isGameOver) announce(`Game to ${player === 1 ? 'you' : 'opponent'}. Score ${s1}, ${s2}`);
            else if (currentMode === 'DEUCE' || currentMode === 'GOLDEN POINT') {
                if (currentMode === 'DEUCE' && p1 >= 3 && p2 >= 3) announce(p1 === p2 ? "Deuce" : (p1 > p2 ? "Advantage You" : "Advantage Opponent"));
                else announce(`${vals[p1]}, ${vals[p2]}`);
            } else announce(`${p1}, ${p2}`);

            const areaId = player === 1 ? 'p1Area' : 'p2Area';
            document.getElementById(areaId).classList.add('flash');
            setTimeout(() => document.getElementById(areaId).classList.remove('flash'), 100);
            render(); lockInput();
        }

        function undo() {
            if (isInputLocked) return;
            if (history.length > 0) {
                const last = history.pop();
                p1 = last.p1; p2 = last.p2; s1 = last.s1; s2 = last.s2; isGameOver = last.isGameOver;
                render(); announce("Undo."); lockInput();
            }
        }

        function handleInput(player) {
            if (isInputLocked) return;
            if (!voiceUnlocked) { unlockVoice(); return; }
            if (isGameOver) { p1 = 0; p2 = 0; isGameOver = false; render(); announce("New game"); lockInput(); } 
            else handleScore(player);
        }

        document.addEventListener('keyup', (e) => {
            const key = e.key;
            if (isInputLocked) return;

            // Direct Shortcuts (even without voice unlock check, these will trigger unlock)
            if (key === '1') handleInput(1);
            else if (key === '2') handleInput(2);
            else if (key === '3') uiUndo();
            else if (key === '4') uiAnnounce();
            else if (key === '5') toggleFullscreen();
            else if (key === '0') cycleMode();
            else if (key === '9') location.reload();
            
            // Universal Enter Key
            else if (key.toLowerCase() === 'enter') {
                if (!voiceUnlocked) { unlockVoice(); return; }
                if (isGameOver) { p1 = 0; p2 = 0; isGameOver = false; render(); announce("New game"); lockInput(); return; }
                clickCount++;
                if (clickTimer) clearTimeout(clickTimer);
                clickTimer = setTimeout(() => {
                    if (clickCount === 1) handleScore(1);
                    else if (clickCount === 2) handleScore(2);
                    else if (clickCount === 3) undo();
                    else if (clickCount >= 4) announce(getFullStatus());
                    clickCount = 0;
                }, 500);
            }
        });
        
        init();
    </script>
</body>
</html>
