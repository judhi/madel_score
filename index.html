<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MADEL SCORE by JPS</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --p1-color: #00e676; --p2-color: #ff5252; --bg: #000; --header-bg: #111; --lock-red: #d32f2f; }
        body { background: var(--bg); color: #fff; text-align: center; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; margin: 0; overflow: hidden; touch-action: manipulation; }
        header { background: var(--header-bg); padding: 6px 10px; border-bottom: 1px solid #333; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: background 0.3s ease; position: relative; z-index: 100; }
        .locked-header { background: var(--lock-red) !important; }
        #videoContainer { position: fixed; bottom: 45px; right: 10px; width: 60px; height: 45px; border: 1px solid #444; border-radius: 4px; overflow: hidden; z-index: 50; background: #000; pointer-events: none; }
        #input_video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #gestureStatus { position: fixed; bottom: 95px; right: 10px; font-size: 8px; color: #fff; font-weight: bold; background: rgba(0,0,0,0.8); padding: 1px 4px; border-radius: 3px; z-index: 50; min-width: 60px; text-align: center; }
        #lockoutTimer { position: fixed; top: 0; left: 0; width: 100%; height: 5px; background: #fff; z-index: 1000; transform: scaleX(0); transform-origin: left; pointer-events: none; }
        .set-score-bar { background: #1a1a1a; padding: 4px; font-size: 16px; font-weight: bold; color: #888; border-bottom: 1px solid #333; display: flex; justify-content: space-around; z-index: 10; }
        .court { flex: 1; display: flex; flex-direction: row; z-index: 5; }
        .pane { flex: 1; display: flex; flex-direction: column; justify-content: center; position: relative; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .score { font-size: 32vw; font-weight: 900; line-height: 1; margin: 0; pointer-events: none; }
        .label { font-size: 2.5vw; color: #444; text-transform: uppercase; pointer-events: none; }
        .divider { width: 1px; background: #222; }
        .p1-active { color: var(--p1-color) !important; }
        .p2-active { color: var(--p2-color) !important; }
        .win-text { font-size: 22vw !important; color: #fff !important; }
        #footer { background: #111; padding: 6px; font-size: 9px; color: #444; border-top: 1px solid #333; z-index: 10; }
        .is-locked-out { pointer-events: none !important; }
    </style>
</head>
<body id="appBody" onclick="forceUnlockVoice()">

    <div id="lockoutTimer"></div>
    <div id="gestureStatus">BOOT...</div>
    <div id="videoContainer"><video id="input_video" autoplay playsinline muted></video></div>

    <header id="mainHeader">
        <span id="brand">MADEL SCORE by JPS</span>
        <div class="toolbar">
            <button id="modeBtn" class="btn" onclick="openModal()">DEUCE (0)</button>
            <button class="btn" onclick="uiUndo()">UNDO (3)</button>
            <button class="btn" onclick="uiAnnounce()">REPORT (4)</button>
            <button id="fsBtn" class="btn" onclick="toggleFullscreen()">FULL (5)</button>
            <button id="zoomBtn" class="btn" onclick="toggleZoom()">ZOOM: OFF</button>
            <button class="btn" style="background:#500" onclick="hardReset()">RESET</button>
        </div>
    </header>

    <div class="set-score-bar">
        <div>YOU: <span id="set1">0</span></div>
        <div>OPP: <span id="set2">0</span></div>
    </div>

    <div id="courtArea" class="court">
        <div id="p1Area" class="pane" onclick="handleInput(1, event)">
            <div class="label">YOU (☝️)</div>
            <div id="p1Disp" class="score p1-active">0</div>
        </div>
        <div class="divider"></div>
        <div id="p2Area" class="pane" onclick="handleInput(2, event)">
            <div class="label">OPP (✌️)</div>
            <div id="p2Disp" class="score p2-active">0</div>
        </div>
    </div>

    <div id="footer">✋✋:RESET | 🤟:ZOOM | ✋:FULL | ✊:MODE | ☝️:YOU | ✌️:OPP</div>

    <script>
        let p1 = 0, p2 = 0, s1 = 0, s2 = 0, history = [];
        let currentMode = 'DEUCE', isGameOver = false, voiceUnlocked = false, isInputLocked = false, isZoomed = false;
        const modes = ['DEUCE', 'GOLDEN POINT', '16 point', '21 point', '24 point', '32 point'];
        const vals = ["0", "15", "30", "40", "AD"], voiceVals = ["Zero", "15", "30", "40", "AD"];
        const synth = window.speechSynthesis;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let gestureBuffer = [], clickCount = 0, clickTimer = null;

        function init() {
            const savedMode = localStorage.getItem('madel_mode');
            if (savedMode) { currentMode = savedMode; document.getElementById('modeBtn').innerText = savedMode + " (0)"; }
            render();
            setupGestures();
        }

        function playBeep(freq = 880, duration = 0.1) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function forceUnlockVoice() {
            if (voiceUnlocked) return;
            if ('mediaSession' in navigator) { 
                navigator.mediaSession.metadata = new MediaMetadata({ title: 'MADEL SCORE', artist: 'JPS' }); 
            }
            voiceUnlocked = true; synth.cancel();
            const silent = new SpeechSynthesisUtterance("Umpire ready"); synth.speak(silent);
            playBeep(440, 0.2); lockInput();
        }

        function announce(t) {
            if (!voiceUnlocked) return;
            synth.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'en-US'; m.rate = 1.0;
            const voices = synth.getVoices();
            const preferred = voices.find(v => v.lang.includes('en-GB') || v.lang.includes('en-US'));
            if (preferred) m.voice = preferred;
            synth.speak(m);
        }

        function lockInput() {
            isInputLocked = true;
            document.getElementById('mainHeader').classList.add('locked-header');
            document.body.classList.add('is-locked-out');
            const bar = document.getElementById('lockoutTimer');
            bar.style.transition = "none"; bar.style.transform = "scaleX(1)";
            setTimeout(() => { bar.style.transition = "transform 2s linear"; bar.style.transform = "scaleX(0)"; }, 50);
            setTimeout(() => {
                isInputLocked = false;
                document.getElementById('mainHeader').classList.remove('locked-header');
                document.body.classList.remove('is-locked-out');
                document.getElementById('gestureStatus').innerText = "READY";
            }, 2000);
        }

        function setupGestures() {
            const video = document.getElementById('input_video');
            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
            
            hands.onResults((results) => {
                const status = document.getElementById('gestureStatus');
                if (isInputLocked) return;

                if (results.multiHandLandmarks && results.multiHandLandmarks.length === 2) {
                    let palms = 0;
                    results.multiHandLandmarks.forEach(hand => {
                        const f = [8, 12, 16, 20].map(i => hand[i].y < hand[i-2].y);
                        if (f.filter(Boolean).length >= 4) palms++;
                    });
                    if (palms === 2) {
                        status.innerText = "RESET...";
                        gestureBuffer.push("RESET");
                        if (gestureBuffer.length >= 3) { playBeep(220, 0.5); hardReset(); gestureBuffer = []; }
                        return;
                    }
                }

                if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                    status.innerText = "WAITING...";
                    gestureBuffer = [];
                    return;
                }

                const lm = results.multiHandLandmarks[0];
                const isUpright = (Math.atan2(lm[9].y - lm[0].y, lm[9].x - lm[0].x) * (180 / Math.PI)) < -45;
                if (!isUpright) { status.innerText = "TILTING..."; return; }
                if (isZoomed && (lm[0].x < 0.25 || lm[0].x > 0.75)) return;

                const indexUp = lm[8].y < lm[6].y;
                const middleUp = lm[12].y < lm[10].y;
                const ringUp = lm[16].y < lm[14].y;
                const pinkyUp = lm[20].y < lm[18].y;
                const thumbOut = Math.abs(lm[4].x - lm[2].x) > 0.12;
                const count = [indexUp, middleUp, ringUp, pinkyUp].filter(Boolean).length;

                let act = null;
                if (count === 0 && !thumbOut) act = "MODE";
                else if (thumbOut && indexUp && pinkyUp && !middleUp && !ringUp) act = "ILY_ZOOM";
                else if (count === 1 && indexUp) act = "YOU";
                else if (count === 2 && indexUp && middleUp && !thumbOut) act = "OPP";
                else if (count === 3 && !thumbOut) act = "UNDO";
                else if (count === 4 && !thumbOut) act = "REPORT";
                else if (count === 4 && thumbOut) act = "FULLSCR";

                if (act) {
                    gestureBuffer.push(act);
                    status.innerText = act + " " + gestureBuffer.length + "/2";
                    if (gestureBuffer.length >= 2) {
                        const res = gestureBuffer[0]; gestureBuffer = [];
                        playBeep(880, 0.1); 
                        if (res === "MODE") openModal();
                        else if (res === "YOU") handleInput(1);
                        else if (res === "OPP") handleInput(2);
                        else if (res === "UNDO") uiUndo();
                        else if (res === "REPORT") uiAnnounce();
                        else if (res === "FULLSCR") toggleFullscreen();
                        else if (res === "ILY_ZOOM") toggleZoom();
                    }
                } else { gestureBuffer = []; }
            });
            new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width: 640, height: 480 }).start();
        }

        function hardReset() {
            p1 = 0; p2 = 0; s1 = 0; s2 = 0; isGameOver = false; history = [];
            render(); announce("Match reset."); lockInput();
        }

        function handleInput(player, event) {
            if (event) { event.stopPropagation(); event.preventDefault(); }
            if (isInputLocked) return;
            if (!voiceUnlocked) { forceUnlockVoice(); return; }
            if (isGameOver) { p1 = 0; p2 = 0; isGameOver = false; render(); announce("New game"); lockInput(); return; }
            handleScore(player);
        }

        function handleScore(player) {
            history.push({p1, p2, s1, s2, isGameOver});
            if (player === 1) p1++; else p2++;
            if (currentMode === 'GOLDEN POINT') { if (p1 === 4 || p2 === 4) { isGameOver = true; if(p1 === 4) s1++; else s2++; } }
            else if (currentMode === 'DEUCE') { if ((p1 > 3 && p1 - p2 >= 2) || (p2 > 3 && p2 - p1 >= 2)) { isGameOver = true; if(p1 > p2) s1++; else s2++; } }
            else { let limit = parseInt(currentMode); if (p1 + p2 >= limit) { isGameOver = true; if(p1 > p2) s1++; else s2++; } }
            if (isGameOver) announce(`Game to ${player === 1 ? 'you' : 'opponent'}. Set score ${s1} to ${s2}`);
            else announce(getVoiceScore());
            render(); lockInput();
        }

        function render() {
            document.getElementById('set1').innerText = s1;
            document.getElementById('set2').innerText = s2;
            const d1 = document.getElementById('p1Disp'), d2 = document.getElementById('p2Disp');
            d1.classList.remove('win-text'); d2.classList.remove('win-text');
            const isTennis = (currentMode === 'DEUCE' || currentMode === 'GOLDEN POINT');
            if (isGameOver) {
                if (p1 > p2) { d1.innerText = "WIN"; d1.classList.add('win-text'); d2.innerText = isTennis ? (vals[p2] || "40") : p2; }
                else { d2.innerText = "WIN"; d2.classList.add('win-text'); d1.innerText = isTennis ? (vals[p1] || "40") : p1; }
            } else if (isTennis) {
                if (currentMode === 'DEUCE' && p1 >= 3 && p2 >= 3) {
                    if (p1 === p2) { d1.innerText = "40"; d2.innerText = "40"; }
                    else { d1.innerText = (p1 > p2) ? "AD" : "40"; d2.innerText = (p2 > p1) ? "AD" : "40"; }
                } else { d1.innerText = vals[p1] || p1; d2.innerText = vals[p2] || p2; }
            } else { d1.innerText = p1; d2.innerText = p2; }
        }

        function getVoiceScore() { if (currentMode==='DEUCE'||currentMode==='GOLDEN POINT') { if (currentMode==='DEUCE'&&p1>=3&&p2>=3) return p1===p2?"Deuce":(p1>p2?"Advantage You":"Advantage Opponent"); return `${voiceVals[p1]||p1}, ${voiceVals[p2]||p2}`; } return `${p1}, ${p2}`; }
        function uiUndo() { if (isInputLocked) return; if (history.length > 0) { const l = history.pop(); p1=l.p1; p2=l.p2; s1=l.s1; s2=l.s2; isGameOver=l.isGameOver; render(); announce("Undo."); lockInput(); } }
        function uiAnnounce() { if (isInputLocked) return; announce(`Score is ${getVoiceScore()}. Set score is ${s1} to ${s2}`); lockInput(); }
        function toggleZoom() { isZoomed = !isZoomed; document.getElementById('zoomBtn').innerText = isZoomed ? "ZOOM: 2X" : "ZOOM: OFF"; document.getElementById('input_video').style.transform = isZoomed ? "scaleX(-2) scaleY(2)" : "scaleX(-1) scaleY(1)"; if(voiceUnlocked) announce("Zoom " + (isZoomed ? "on" : "off")); }
        function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
        function openModal() { if(p1===0 && p2===0) { let next = (modes.indexOf(currentMode)+1)%modes.length; currentMode = modes[next]; localStorage.setItem('madel_mode', currentMode); document.getElementById('modeBtn').innerText = currentMode + " (0)"; if(voiceUnlocked) announce("Mode " + currentMode); lockInput(); } }

        document.addEventListener('keydown', (e) => {
            if (isInputLocked) return;
            const k = e.key;
            if (k === 'Enter') {
                e.preventDefault(); if (!voiceUnlocked) { forceUnlockVoice(); return; }
                if (isGameOver) { handleInput(0); return; }
                clickCount++; if (clickTimer) clearTimeout(clickTimer);
                clickTimer = setTimeout(() => {
                    if (clickCount === 1) handleScore(1); else if (clickCount === 2) handleScore(2);
                    else if (clickCount === 3) uiUndo(); else if (clickCount >= 4) uiAnnounce();
                    clickCount = 0;
                }, 500);
            } else {
                if (k === '1') handleInput(1); else if (k === '2') handleInput(2);
                else if (k === '3') uiUndo(); else if (k === '4') uiAnnounce();
                else if (k === '5') toggleFullscreen(); else if (k === '0') openModal(); else if (k === '9') location.reload();
            }
        });
        init();
    </script>
</body>
</html>
